# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - chd-ds-seas5-viz

on:
  push:
    branches:
      - merge-cerf-exposure
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # The Azure App Service container is pinned to Python 3.10 but the
      # main project is developed against 3.12. To deploy without
      # reconfiguring the repo, the app has its own minimal pyproject at
      # app/pyproject.toml that targets 3.10+. We compile it here into a
      # root-level requirements.txt that Oryx will pick up and install
      # via pip on the server.
      - name: Generate requirements.txt (Python 3.10, linux)
        run: |
          uv pip compile \
            --python-version 3.10 \
            --python-platform linux \
            app/pyproject.toml \
            -o requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !.venv/
            !app/__marimo__/
            !book/_cache/
            !book/_output/
            !_output/
            !.git/
            !.github/

      # 🚫 Opting Out of Oryx Build
      # If you prefer to disable the Oryx build process during deployment, follow these steps:
      # 1. Remove the SCM_DO_BUILD_DURING_DEPLOYMENT app setting from your Azure App Service Environment variables.
      # 2. Refer to sample workflows for alternative deployment strategies: https://github.com/Azure/actions-workflow-samples/tree/master/AppService


  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'chd-ds-seas5-viz'
          slot-name: 'cerf-rr'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_268AAF92803F475B8F32EA757A994AE0 }}

# -----------------------------------------------------------------------------
# Azure App Service runtime setup (not configured by this workflow):
#
# 1. Startup command (configure in Azure Portal > App Service > Configuration):
#      marimo run app/cerf_predictor.py --host 0.0.0.0 --port 8000 --headless
#    App Service routes external traffic to whatever $PORT is configured
#    (default 8000). Marimo must bind to 0.0.0.0 to accept proxied requests.
#
# 2. Python version: the App Service container is pinned to Python 3.10.
#    The deploy requirements.txt is compiled against 3.10 via
#    app/pyproject.toml (separate from the root project, which dev uses
#    at 3.12). If the container is upgraded, bump --python-version in
#    the compile step above and in app/pyproject.toml's requires-python.
#
# 3. Environment variables: copy the SAS tokens from the local .env into
#    App Service > Configuration > Environment variables
#    (DSCI_AZ_BLOB_DEV_SAS etc).
#
# 4. Oryx will auto-install from the exported requirements.txt. No manual
#    pip install needed unless SCM_DO_BUILD_DURING_DEPLOYMENT is disabled.
# -----------------------------------------------------------------------------
