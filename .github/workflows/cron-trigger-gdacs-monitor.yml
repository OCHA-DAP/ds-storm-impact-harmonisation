name: Cron trigger — GDACS monitor email

# This workflow is the only thing that lives on `main` for the GDACS
# monitor email pipeline. The actual workflow that fetches storms,
# renders the email, and submits the Listmonk campaign lives at
# .github/workflows/daily-gdacs-monitor-email.yml on the
# merge-cerf-exposure branch.
#
# We do this split because GitHub Actions only fires `schedule:` triggers
# from the default branch (`main`). Until the larger storm-impact-
# harmonisation work is reviewed and merged, the actual workflow
# needs to keep evolving on its feature branch. This dispatcher lets
# us drive it on a cron without touching the rest of `main`.
#
# When the feature branch eventually merges to main, this dispatcher
# becomes redundant and can be deleted in the same PR.

on:
  schedule:
    - cron: "20 3,9,15,21 * * *" # 20 min after each NHC TCM synoptic time
  workflow_dispatch: {}

permissions:
  actions: write # required to call workflow_dispatch on another workflow

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily-gdacs-monitor-email on merge-cerf-exposure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run daily-gdacs-monitor-email.yml \
            --repo ${{ github.repository }} \
            --ref merge-cerf-exposure
