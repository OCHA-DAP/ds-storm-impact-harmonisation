name: Daily GDACS Monitor Email

# Runs 20 minutes after each NHC/NOAA Tropical Cyclone Message (TCM)
# synoptic cycle (03/09/15/21 UTC), giving GDACS time to ingest. Any
# basin -- source filter is applied in the script only if requested.
#
# IMPORTANT: while the broader storm-impact-harmonisation work lives on
# the merge-cerf-exposure branch (see PR #3), this workflow lives on
# main but checks out the feature branch to get scripts/ and src/.
# This is required because GitHub only fires `schedule:` triggers from
# the default branch -- but our runtime code is not on main yet.
#
# When merge-cerf-exposure (or a slimmed-down version of it) lands on
# main, REMOVE the `ref:` line under actions/checkout below in the
# same PR that brings the runtime code into main.
on:
  schedule:
    - cron: "20 3,9,15,21 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Write HTML preview to artefact instead of sending a Listmonk campaign"
        type: boolean
        default: false
      list_id:
        description: "Listmonk list ID to target (default: 25 test list)"
        type: string
        default: "25"

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Pull script + src/ + pyproject.toml from the feature branch
          # until they land on main. Drop this `ref:` once main has
          # them natively.
          ref: merge-cerf-exposure

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync

      - name: Run monitor
        env:
          DSCI_AZ_BLOB_DEV_SAS: ${{ secrets.DSCI_AZ_BLOB_DEV_SAS }}
          DSCI_LISTMONK_BASE_URL: ${{ secrets.DSCI_LISTMONK_BASE_URL }}
          DSCI_LISTMONK_API_USERNAME: ${{ secrets.DSCI_LISTMONK_API_USERNAME }}
          DSCI_LISTMONK_API_KEY: ${{ secrets.DSCI_LISTMONK_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          else
            # Headless: skip ocha-relay's interactive prompt.
            ARGS="$ARGS --auto-send"
          fi
          if [ -n "${{ github.event.inputs.list_id }}" ]; then
            ARGS="$ARGS --list-id ${{ github.event.inputs.list_id }}"
          fi
          uv run python scripts/daily_gdacs_monitor_email.py $ARGS

      - name: Upload dry-run preview
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: email-preview
          path: artefacts/daily_email_previews/
          if-no-files-found: warn
